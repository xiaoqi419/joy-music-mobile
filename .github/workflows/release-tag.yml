name: Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version (semver), e.g. 1.2.3 or 1.2.3-beta.1
        required: true
        type: string
      release_notes:
        description: Optional release notes for GitHub Release body
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  create-release-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version files
        run: npm run release:version -- "${{ inputs.version }}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit version changes (if any)
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            git add package.json app.json src/config/index.ts
            git commit -m "🔖 chore(release): 发布 v${VERSION}" \
              -m $'需求实现:\n1. 同步 package/app/config 三处版本号，保证版本来源一致。\n2. 为本次发版创建标准化版本提交，供 CI 自动发包复用。'
          else
            echo "No version file changed, continue to tagging."
          fi

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
          TARGET_BRANCH: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="v${VERSION}"

          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q "${TAG_NAME}$"; then
            echo "Tag ${TAG_NAME} already exists on remote." >&2
            exit 1
          fi

          git tag -a "${TAG_NAME}" -m "release: ${TAG_NAME}"
          git push origin "HEAD:${TARGET_BRANCH}"
          git push origin "${TAG_NAME}"

      - name: Trigger iOS unsigned IPA workflow
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
          TARGET_BRANCH: ${{ github.ref_name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="v${VERSION}"
          PAYLOAD=$(jq -n \
            --arg ref "${TARGET_BRANCH}" \
            --arg tag "${TAG_NAME}" \
            --arg notes "${RELEASE_NOTES}" \
            '{ref:$ref, inputs:{upload_release:"true", release_tag:$tag, release_notes:$notes}}')
          curl -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${REPO}/actions/workflows/ios-unsigned-ipa.yml/dispatches" \
            -d "${PAYLOAD}"

      - name: Summary
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "Release tag workflow finished."
          echo "Created tag: v${VERSION}"
          echo "Triggered workflow: iOS Unsigned IPA"
