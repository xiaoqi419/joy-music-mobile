name: iOS Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: Upload IPA to GitHub Release
        type: boolean
        default: false
      release_tag:
        description: Release tag (required when upload_release=true in manual trigger)
        type: string
        required: false
      release_notes:
        description: Optional release notes to append before generated notes
        type: string
        required: false
  push:
    tags:
      - 'v*'
      - 'ios-v*'

permissions:
  contents: write

jobs:
  build-unsigned-ipa:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Print Apple toolchain versions
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphonesimulator --show-sdk-version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install iOS gems
        run: bundle install --jobs 4 --retry 3

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean --non-interactive

      - name: Install CocoaPods
        run: bundle exec pod install --project-directory=ios

      - name: Build unsigned archive and package ipa
        shell: bash
        run: |
          set -euo pipefail

          APP_VERSION=$(node -p "require('./app.json').expo.version")
          IPA_NAME="YueYin-${APP_VERSION}-unsigned.ipa"
          echo "IPA_NAME=${IPA_NAME}" >> "$GITHUB_ENV"

          WORKSPACE_PATH=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          if [[ -z "${WORKSPACE_PATH}" ]]; then
            echo "No xcworkspace found under ios/" >&2
            exit 1
          fi

          # 自动解析 scheme，优先选择非 Pods 的主工程 scheme。
          SCHEMES=$(xcodebuild -workspace "${WORKSPACE_PATH}" -list -json | ruby -rjson -e 'd = JSON.parse(STDIN.read); puts((d.dig("workspace", "schemes") || []).join("\n"))')
          echo "Detected schemes:"
          echo "${SCHEMES}"
          SCHEME=$(printf '%s\n' "${SCHEMES}" | grep -vE '^(Pods-|.*Tests$)' | head -n 1 || true)
          if [[ -z "${SCHEME}" ]]; then
            SCHEME=$(printf '%s\n' "${SCHEMES}" | head -n 1 || true)
          fi
          if [[ -z "${SCHEME}" ]]; then
            echo "No iOS scheme found in workspace: ${WORKSPACE_PATH}" >&2
            exit 1
          fi
          echo "Detected scheme: ${SCHEME}"

          ARCHIVE_PATH="ios/build/${SCHEME}.xcarchive"
          rm -rf ios/build dist "${IPA_NAME}"
          mkdir -p ios/build dist/Payload

          set -o pipefail
          run_archive() {
            xcodebuild \
              -workspace "${WORKSPACE_PATH}" \
              -scheme "${SCHEME}" \
              -configuration Release \
              -sdk iphoneos \
              -destination "generic/platform=iOS" \
              -archivePath "${ARCHIVE_PATH}" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              archive 2>&1 | tee xcodebuild.log
          }

          print_archive_errors() {
            echo "xcodebuild archive failed. Extracting error lines..."
            grep -nE "error:|fatal error:|\\*\\* ARCHIVE FAILED \\*\\*" xcodebuild.log | tail -n 120 || true
          }

          sync_codegen_generated_sources() {
            local generated_dir=""
            generated_dir=$(grep -oE "\\[Codegen\\] Generated artifacts: .*" xcodebuild.log | sed 's/.*Generated artifacts: //' | tail -n 1 || true)

            if [[ -z "${generated_dir}" || ! -d "${generated_dir}" ]]; then
              generated_dir=$(find "${HOME}/Library/Developer/Xcode/DerivedData" \
                -type d \
                -path "*/ReactCodegen.build/DerivedSources/generated/source/codegen/out/build/generated/ios" \
                2>/dev/null | tail -n 1 || true)
            fi

            if [[ -z "${generated_dir}" || ! -d "${generated_dir}" ]]; then
              echo "No generated iOS codegen directory found for sync." >&2
              return 1
            fi

            mkdir -p ios/build/generated/ios
            echo "Syncing codegen artifacts from ${generated_dir} -> ios/build/generated/ios"
            rsync -a "${generated_dir}/" "ios/build/generated/ios/"
          }

          if ! run_archive; then
            if grep -qE "Build input file cannot be found: '.*ios/build/generated/ios/" xcodebuild.log; then
              echo "Detected missing ios/build/generated/ios inputs, try sync + retry once..."
              if sync_codegen_generated_sources && run_archive; then
                echo "Archive succeeded after syncing generated codegen artifacts."
              else
                print_archive_errors
                exit 1
              fi
            else
              print_archive_errors
              exit 1
            fi
          fi

          APP_PATH=$(find "${ARCHIVE_PATH}/Products/Applications" -maxdepth 1 -name "*.app" | head -n 1)
          if [[ -z "${APP_PATH}" ]]; then
            echo "No .app found in archive: ${ARCHIVE_PATH}" >&2
            exit 1
          fi

          cp -R "${APP_PATH}" dist/Payload/
          (
            cd dist
            /usr/bin/zip -qry "../${IPA_NAME}" Payload
          )

      - name: Upload xcodebuild log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IPA_NAME }}
          path: ${{ env.IPA_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Resolve release upload flag
        id: release_flag
        shell: bash
        run: |
          SHOULD_UPLOAD="false"
          TAG_NAME=""
          IS_PRERELEASE="false"
          RELEASE_NOTES=""

          detect_prerelease() {
            local tag="$1"
            if [[ "${tag}" =~ [0-9]+\.[0-9]+\.[0-9]+- ]]; then
              echo "true"
              return
            fi
            echo "false"
          }

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            SHOULD_UPLOAD="true"
            TAG_NAME="${GITHUB_REF_NAME}"
            IS_PRERELEASE="$(detect_prerelease "${TAG_NAME}")"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.upload_release }}" == "true" ]]; then
            SHOULD_UPLOAD="true"
            TAG_NAME="${{ inputs.release_tag }}"
            IS_PRERELEASE="$(detect_prerelease "${TAG_NAME}")"
            RELEASE_NOTES="${{ inputs.release_notes }}"
          fi

          echo "should_upload=${SHOULD_UPLOAD}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          {
            echo "release_notes<<EOF"
            printf '%s\n' "${RELEASE_NOTES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload IPA to GitHub Release
        if: steps.release_flag.outputs.should_upload == 'true' && steps.release_flag.outputs.tag_name != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_flag.outputs.tag_name }}
          files: ${{ env.IPA_NAME }}
          body: ${{ steps.release_flag.outputs.release_notes }}
          append_body: true
          generate_release_notes: true
          prerelease: ${{ steps.release_flag.outputs.is_prerelease }}
